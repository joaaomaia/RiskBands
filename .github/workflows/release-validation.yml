name: release-validation

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate Release Candidate
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.meta.outputs.package-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read package version
        id: meta
        shell: bash
        run: |
          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"
          echo "package-version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install package and release tooling
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .[dev]

      - name: Check dependency consistency
        run: python -m pip check

      - name: Lint with ruff
        run: python -m ruff check riskbands tests

      - name: Run Bandit security scan
        run: python -m bandit -q -r riskbands

      - name: Run full test suite with coverage
        run: |
          python -m pytest -q \
            --basetemp .pytest_tmp_release \
            --cov=riskbands \
            --cov-report=term-missing

      - name: Audit Python dependencies
        run: python -m pip_audit

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  smoke-wheel:
    name: Smoke Install Wheel
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Install wheel in a clean virtual environment
        shell: bash
        run: |
          python -m venv .venv-smoke-wheel
          . .venv-smoke-wheel/bin/activate
          python -m pip install --upgrade pip setuptools
          wheel="$(python - <<'PY'
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}.")
          print(wheels[0])
          PY
          )"
          python -m pip install "${wheel}[viz]"
          python scripts/smoke_test_installed_package.py \
            --expected-version "${{ needs.validate.outputs.package-version }}" \
            --check-viz

  smoke-sdist:
    name: Smoke Install Sdist
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Install sdist in a clean virtual environment
        shell: bash
        run: |
          python -m venv .venv-smoke-sdist
          . .venv-smoke-sdist/bin/activate
          python -m pip install --upgrade pip setuptools
          python -m pip install dist/*.tar.gz
          python scripts/smoke_test_installed_package.py \
            --expected-version "${{ needs.validate.outputs.package-version }}"
