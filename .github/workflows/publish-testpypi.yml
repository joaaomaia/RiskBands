name: publish-testpypi

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-testpypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-release-target:
    name: Validate TestPyPI Release Target
    runs-on: ubuntu-latest
    outputs:
      package-version: ${{ steps.meta.outputs.package-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Run this workflow against a git tag, not a branch." >&2
            exit 1
          fi

          version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          )"

          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pyproject version v${version}." >&2
            exit 1
          fi

          echo "package-version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    needs: validate-release-target

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run release-oriented test subset
        run: |
          pytest -q \
            tests/test_public_api.py \
            tests/test_api_usability.py \
            tests/test_binning_engine.py \
            tests/test_compare.py \
            tests/test_examples_smoke.py \
            tests/test_stable_score.py \
            tests/test_temporal_stability.py \
            --basetemp .pytest_tmp_release

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Distributions to TestPyPI
    runs-on: ubuntu-latest
    needs:
      - validate-release-target
      - build
    environment:
      name: testpypi
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist

      - name: Publish to TestPyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
